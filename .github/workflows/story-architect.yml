name: Story Architect

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  expand:
    if: github.event.label.name == 'story:expand'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const msg = 'Story Architect aktiverad for Issue #' + issue.number + '\n\nKopiera denna prompt till Copilot i VS Code:\n\nSkapa en komplett story med: Mal, Bakgrund, Omfattning, Acceptanskriterier, Testplan, Risker, Oppna fragor\n\nIdea: ' + issue.title;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: msg
            });
