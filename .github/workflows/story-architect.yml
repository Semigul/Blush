name: Story Architect

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  expand:
    if: github.event.label.name == 'story:expand'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const story = `# ${issue.title}

## Mål
${issue.body || 'Beskriv här vad målet är'}

## Bakgrund
Varför behöver vi detta? Vad är kontexten?

## Omfattning
Vad ingår i denna task?

## Utanför omfattning
Vad ingår INTE? Vad är sparkat för senare?

## Acceptanskriterier
- [ ] Kriterium 1
- [ ] Kriterium 2
- [ ] Kriterium 3

## Testplan
Hur testar vi att detta fungerar?

## Risker
Vilka risker finns? Vad kan gå fel?

## Öppna frågor
- Fråga 1?
- Fråga 2?
`;

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: story
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: 'Story Architect har genererat en basstruktur! Granska och uppdatera delen som behover justeras, sedan lag etiketten "story" nar du ar nojd.'
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['awaiting-story-review']
            });
