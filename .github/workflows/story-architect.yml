name: Story Architect

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  expand:
    if: github.event.label.name == 'story:expand'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const story = '# ' + issue.title + '\n\n## Mal\n' + (issue.body || 'Beskriv målet') + '\n\n## Bakgrund\nVarför behöver vi detta?\n\n## Omfattning\nVad ingår?\n\n## Utanför omfattning\nVad ingår INTE?\n\n## Acceptanskriterier\n- Kriterium 1\n- Kriterium 2\n- Kriterium 3\n\n## Testplan\nHur testar vi detta?\n\n## Risker\nVilka risker finns?\n\n## Oppna fragor\n- Fråga?';
            
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: story
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: 'Story genererad! Granska och uppdatera delar som behover justering. Lag sedan etiketten "story".'
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['awaiting-story-review']
            });
