name: Agent - Implementering

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  prepare-implement:
    if: github.event.label.name == 'agent:ready'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const prompt = `Implementera denna godkanna story i Blush & Bluff:

STORY:
${issue.body || 'Ingen story'}

REGLER:
- Implementera BARA vad som star i storyn
- Andra INTE .github, secrets, Firebase-regler
- Kor node --check app.js for att validera
- Skapa INGEN release

Beskriv vilka filer du andrade och vad du gjorde.`;

            const msg = '### Implementeringsagent aktiverad\n\nKopiera denna prompt till Copilot Chat i VS Code (Cmd+I):\n\n\`\`\`\n' + prompt + '\n\`\`\`\n\nImplementera ändringarna i VS Code, committa sedan och skapa en pull request.';
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: msg
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['awaiting-implementation']
            });
