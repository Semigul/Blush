name: Agent Implement

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  implement:
    if: github.event.label.name == 'agent:ready'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const msg = 'Implementeringsagent aktiverad for Issue #' + issue.number + '\n\nStory:\n' + issue.body + '\n\nImplementera detta i VS Code med Copilot. Nar du ar klar:\n1. Skapa en ny branch: git switch -c implement/issue-' + issue.number + '\n2. Committa: git add -A && git commit -m "Implementera story #' + issue.number + '"\n3. Pusha: git push origin implement/issue-' + issue.number + '\n4. Skapa en PR pa GitHub';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: msg
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['awaiting-implementation']
            });
