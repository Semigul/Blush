name: Agent Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  review:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const msg = 'Review-agent aktiverad for PR #' + pr.number + '\n\nGranska denna kod med Copilot Chat:\n- Finns det buggar?\n- Security-risker?\n- Regressioner?\n- Saknade tester?\n\nKommentera med resultatet har.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: msg
            });
